{% extends "wagtailmedia/media/edit.html" %}

{% block form_row %}
    <div class="row row-flush nice-padding">
        <div class="col10">
            {% if media.type == "video" %}
                <p>
                    View live video page at: <a href="{{ VIDEO_PAGE_URL }}{{ media.uuid }}">{{ VIDEO_PAGE_URL }}{{ media.uuid }}</a>
                </p>
            {% else %}
                <p>
                    View live audio page at: <a href="{{ AUDIO_PAGE_URL }}{{ media.uuid }}">{{ AUDIO_PAGE_URL }}{{ media.uuid }}</a>
                </p>
            {% endif %}
        </div>
    </div>
    {{ block.super }}
{% endblock %}
